services:
  # ── MySQL 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: yanwai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: yanwai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./yanwai-backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - yanwai-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SpringBoot 后端 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: yanwai-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/yanwai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - YANWAI_AI_API_KEY=${YANWAI_AI_API_KEY}
      - YANWAI_AI_BASE_URL=${YANWAI_AI_BASE_URL:-https://api.deepseek.com}
      - YANWAI_AI_VISION_API_KEY=${YANWAI_AI_VISION_API_KEY}
      - YANWAI_AI_VISION_BASE_URL=${YANWAI_AI_VISION_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - YANWAI_AI_VISION_MODEL=${YANWAI_AI_VISION_MODEL:-doubao-seed-1-6-vision-250815}
      - JWT_SECRET=${JWT_SECRET:-yanwai-production-secret-key-must-be-at-least-256-bits-long}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - yanwai-net
    restart: unless-stopped

  # ── Web App 前端 ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: yanwai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - yanwai-net
    restart: unless-stopped

  # ── 管理后台 ──
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: yanwai-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - yanwai-net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  yanwai-net:
    driver: bridge
