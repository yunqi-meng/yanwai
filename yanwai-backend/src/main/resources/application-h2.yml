server:
  port: 8080

spring:
  application:
    name: yanwai-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yanwai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

yanwai:
  ai:
    api-key: ${AI_API_KEY:sk-test-key}
    base-url: ${AI_BASE_URL:https://api.deepseek.com}
    model: ${AI_MODEL:deepseek-chat}
    max-tokens: 2000
    temperature: 0.7
    enable-mock: true
  game:
    card-drop-probability: 0.3
    fragment-count-for-synthesis: 5
    free-daily-analysis: 3
