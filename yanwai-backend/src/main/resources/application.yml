server:
  port: 8080

spring:
  application:
    name: yanwai-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/yanwai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

yanwai:
  ai:
    api-key: ${YANWAI_AI_API_KEY:}
    base-url: ${YANWAI_AI_BASE_URL:https://api.deepseek.com}
    model: ${YANWAI_AI_MODEL:deepseek-v4-flash}
    vision-base-url: ${YANWAI_AI_VISION_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
    vision-api-key: ${YANWAI_AI_VISION_API_KEY:}
    vision-model: ${YANWAI_AI_VISION_MODEL:doubao-seed-2-0-lite-260428}
    vision-url: ${yanwai.ai.vision-base-url}/responses
    max-tokens: 2000
    temperature: 0.7
    enable-mock: false
  game:
    card-drop-probability: 0.3
    free-daily-analysis: 3
  jwt:
    secret: ${JWT_SECRET:yanwai-default-secret-key-must-be-at-least-256-bits-long-for-hmac-sha}
    expiration: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
